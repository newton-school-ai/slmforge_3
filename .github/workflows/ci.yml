name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [main]

jobs:
  guard:
    name: Hygiene checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ASCII-only check
        run: |
          python -c "import os, sys; files = [f for f in os.popen('git ls-files').read().splitlines() if f.endswith(('.md', '.py', '.sh', '.yml', '.yaml', '.toml')) and os.path.exists(f)]; bad = [f for f in files if any(b >= 128 for b in open(f, 'rb').read())]; (print('Non-ASCII chars in:', bad) or sys.exit(1)) if bad else sys.exit(0)"

      - name: Internal-data path guard
        run: |
          python -c "import os, sys, re; files = os.popen('git ls-files').read().splitlines(); bad = [f for f in files if re.search(r'(_internal/(?!PROJECT_CONTEXT\.md$))|nst-internal|newton-internal', f)]; (print('Forbidden internal-data paths:', bad) or sys.exit(1)) if bad else sys.exit(0)"

  test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: |
          ruff check .
          black --check .
      - name: Unit tests
        run: pytest tests/unit -q
