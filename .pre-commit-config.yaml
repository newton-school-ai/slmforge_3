repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: block-internal-data
        name: Block internal NST data paths
        entry: python -c "import os, sys, re; files = [f for f in sys.argv[1:] if os.path.exists(f)]; bad = [f for f in files if re.search(r'(_internal/(?!PROJECT_CONTEXT\.md$))|nst-internal|newton-internal', f)]; (print('Blocked internal-data path:', bad) or sys.exit(1)) if bad else sys.exit(0)"
        language: system
        files: _internal/|nst-internal|newton-internal
        pass_filenames: true
      - id: ascii-only
        name: Enforce ASCII-only in tracked text files
        entry: python -c "import os, sys; files = [f for f in sys.argv[1:] if os.path.exists(f)]; bad = [f for f in files if any(b >= 128 for b in open(f, 'rb').read())]; (print('Non-ASCII chars in:', bad) or sys.exit(1)) if bad else sys.exit(0)"
        language: system
        files: \.(md|py|sh|yml|yaml|toml)$
        pass_filenames: true
