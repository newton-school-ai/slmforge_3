repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: block-internal-data
        name: Block internal NST data paths
        entry: >-
          bash -c 'if git diff --cached --name-only | grep -E "^_internal/|nst-internal|newton-internal" | grep -v -x "_internal/PROJECT_CONTEXT.md" | grep -q .; then echo "Blocked: internal-data path"; exit 1; fi'
        language: system
        pass_filenames: false
      - id: ascii-only
        name: Enforce ASCII-only in tracked text files
        entry: >-
          python -c 'import sys; bad = [f for f in sys.argv[1:] if any(b > 127 for b in open(f, "rb").read())]; (print("Non-ASCII characters in:", bad) or sys.exit(1)) if bad else sys.exit(0)'
        language: python
        types: [text]
        files: \.(md|py|sh|yml|yaml|toml)$
